services:
  openclaw-hooks-proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw-hooks.entrypoints=websecure"
      - "traefik.http.routers.openclaw-hooks.rule=Host(`hooks.srv1439489.hstgr.cloud`)"
      - "traefik.http.routers.openclaw-hooks.tls.certresolver=letsencrypt"
      - "traefik.http.services.openclaw-hooks.loadbalancer.server.port=80"
networks:
  default:
    external: true
    name: openclaw-wwff_default

services:
  runmusic-render-proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.runmusic-render.entrypoints=websecure"
      - "traefik.http.routers.runmusic-render.rule=Host(`render.srv1439489.hstgr.cloud`)"
      - "traefik.http.routers.runmusic-render.tls.certresolver=letsencrypt"
      - "traefik.http.services.runmusic-render.loadbalancer.server.port=80"
networks:
  default:
    external: true
    name: openclaw-wwff_default
